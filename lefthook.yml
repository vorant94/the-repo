pre-push:
  commands:
    test:
      run: pnpm exec turbo test
    unused-code:check:
      run: pnpm run unused-code:check
    deps-mismatch:check:
      run: pnpm run deps-mismatch:check
pre-commit:
  commands:
    lint:ci:
      run: pnpm run lint:ci
    ts:check:
      run: pnpm exec turbo ts:check
