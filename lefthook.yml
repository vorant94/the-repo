pre-push:
  commands:
    test:
      run: pnpm run test
    unused-code:check:
      run: pnpm -r run --if-present ts:codegen && pnpm run unused-code:check
pre-commit:
  commands:
    lint:ci:
      run: pnpm run lint:ci
    prettier:check:
      run: pnpm run prettier:check
    ts:check:
      run: pnpm -r run --if-present ts:check
