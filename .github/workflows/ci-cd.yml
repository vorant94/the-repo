name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - master

permissions:
  contents: read

jobs:
  detect:
    name: Detect Affected Applications
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.affected.outputs.packages }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23.6
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute Affected Applications
        id: affected
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PKGS=$(pnpm list -r --filter "./apps/**" --depth 0 --json | jq -c '[.[].name]')
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            PKGS=$(pnpm list -r --filter "...[${BASE}]" --depth 0 --json | jq -c '[.[].name]')
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
              BASE="HEAD^1"
            fi
            PKGS=$(pnpm list -r --filter "...[${BASE}]" --depth 0 --json | jq -c '[.[].name]')
          fi
          echo "packages=$PKGS" >> $GITHUB_OUTPUT

  workspace-checks:
    name: Workspace Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23.6
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:ci

      - name: Test
        run: pnpm run test

      - name: Unused Code
        run: pnpm run unused-code:check

  grimoire:
    needs: [detect, workspace-checks]
    if: contains(fromJson(needs.detect.outputs.packages || '[]'), 'grimoire')
    uses: ./.github/workflows/pipeline.yml
    with:
      workspace: grimoire

  mana-forge:
    needs: [detect, workspace-checks]
    if: contains(fromJson(needs.detect.outputs.packages || '[]'), 'mana-forge')
    uses: ./.github/workflows/pipeline.yml
    with:
      workspace: mana-forge
    secrets:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  sofash:
    needs: [detect, workspace-checks]
    if: contains(fromJson(needs.detect.outputs.packages || '[]'), 'sofash')
    uses: ./.github/workflows/pipeline.yml
    with:
      workspace: sofash
    secrets:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  digital-garden:
    needs: [detect, workspace-checks]
    if: contains(fromJson(needs.detect.outputs.packages || '[]'), 'digital-garden')
    uses: ./.github/workflows/pipeline.yml
    with:
      workspace: digital-garden
    secrets:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  subs-savvy:
    needs: [detect, workspace-checks]
    if: contains(fromJson(needs.detect.outputs.packages || '[]'), 'subs-savvy')
    uses: ./.github/workflows/pipeline.yml
    with:
      workspace: subs-savvy
    secrets:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
