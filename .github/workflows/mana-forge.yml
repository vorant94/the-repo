name: Mana Forge CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    paths-ignore:
      - "apps/sofash/**"
      - "apps/digital-garden/**"
      - "apps/grimoire/**"
      - "apps/subs-savvy/**"
      - ".github/workflows/sofash.yml"
      - ".github/workflows/digital-garden.yml"
      - ".github/workflows/subs-savvy.yml"
      - "biome.jsonc"
      - ".editorconfig"
      - "**/README.md"
      - "tools"
      - "CLAUDE.md"
      - ".claude"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & NPM
        uses: ./.github/actions/setup

      - name: Lint
        run: npm run lint:ci

  ts:
    name: TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & NPM
        uses: ./.github/actions/setup

      - name: TS
        run: npm run ts:check --workspace mana-forge

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - ts
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & NPM
        id: setup
        uses: ./.github/actions/setup

      - name: Build App Bundle
        run: npm run build --workspace mana-forge

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: apps/mana-forge/dist
          retention-days: 30

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - lint
      - ts
      - build
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master'
    concurrency:
      group: subs-savvv-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & NPM
        id: setup
        uses: ./.github/actions/setup

      - name: Download App Bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: apps/mana-forge/dist

      - name: Deploy Bundle
        working-directory: apps/mana-forge
        run: npm run deploy --workspace mana-forge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
