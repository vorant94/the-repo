name: App Pipeline

on:
  workflow_call:
    inputs:
      workspace:
        type: string
        required: true
    secrets:
      CF_API_TOKEN:
        required: false
      CF_ACCOUNT_ID:
        required: false

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    outputs:
      has_e2e: ${{ steps.check-e2e.outputs.has_e2e }}
      has_deploy: ${{ steps.check-deploy.outputs.has_deploy }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23.6
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check E2E
        id: check-e2e
        run: |
          jq -e '.scripts["e2e"]' apps/${{ inputs.workspace }}/package.json > /dev/null 2>&1 \
            && echo "has_e2e=true" >> $GITHUB_OUTPUT \
            || echo "has_e2e=false" >> $GITHUB_OUTPUT

      - name: Check Deploy
        id: check-deploy
        run: |
          jq -e '.scripts["deploy:production"]' apps/${{ inputs.workspace }}/package.json > /dev/null 2>&1 \
            && echo "has_deploy=true" >> $GITHUB_OUTPUT \
            || echo "has_deploy=false" >> $GITHUB_OUTPUT

      - name: TS Check
        run: pnpm --filter=${{ inputs.workspace }} run ts:check

      - name: Are Translations Sorted
        run: pnpm --filter=${{ inputs.workspace }} run --if-present are-translations-sorted

      - name: Build
        run: pnpm --filter=${{ inputs.workspace }} run --if-present build

      - name: Upload Build
        if: steps.check-deploy.outputs.has_deploy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.workspace }}
          path: apps/${{ inputs.workspace }}/dist
          include-hidden-files: true
          retention-days: 1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [ci]
    if: needs.ci.outputs.has_e2e == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 23.6
          cache: pnpm

      - name: Install Dependencies1
        run: pnpm install --frozen-lockfile

      - name: Define Playwright Version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(pnpm list --filter ${{ inputs.workspace }} @playwright/test --json \
            | jq -r '.[0].devDependencies["@playwright/test"].version')
          echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ steps.setup-node.outputs.node-version }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ hashFiles(format('apps/{0}/playwright.config.ts', inputs.workspace)) }}

      - name: Install Playwright with Dependencies
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pnpm --filter=${{ inputs.workspace }} run e2e:install

      - name: Install Playwright Dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: pnpm --filter=${{ inputs.workspace }} run e2e:install-deps

      - name: Run E2E
        run: pnpm --filter=${{ inputs.workspace }} run e2e

      - name: Upload E2E Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ inputs.workspace }}
          path: apps/${{ inputs.workspace }}/playwright-report/
          retention-days: 30

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      needs.ci.outputs.has_deploy == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
        (github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'preview') &&
          contains(github.event.pull_request.labels.*.name, inputs.workspace))
      )
    concurrency:
      group: deploy-${{ inputs.workspace }}
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23.6
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ inputs.workspace }}
          path: apps/${{ inputs.workspace }}/dist

      - name: Migrate
        run: pnpm --filter=${{ inputs.workspace }} run --if-present migrate:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Production
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        run: pnpm --filter=${{ inputs.workspace }} run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Preview
        if: |
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'preview') &&
          contains(github.event.pull_request.labels.*.name, inputs.workspace)
        run: pnpm --filter=${{ inputs.workspace }} run deploy:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
